<!doctype html>
<html data-bs-theme="dark" lang="es">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Flask Academy</title>

    <link   crossorigin="anonymous"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand text-warning fw-bold" href="/">🎓 Flask Academy</a>
        <div>
            <a class="btn btn-outline-warning btn-sm me-2" href="/">Listado</a>
            <a class="btn btn-warning btn-sm" href="/agregar">Agregar Curso</a>
        </div>
    </div>
</nav>

<div class="container py-5">
    <header class="mb-4">
        <h1 class="text-center text-warning fw-bold display-5">🎓 Flask Academy</h1>
    </header>

    <main>
        <div class="card border-0 shadow">
            <div class="card-body">
                {% if cursos %}
                <table class="table table-dark table-hover align-middle">
                    <thead>
                    <tr class="text-warning">
                        <th>ID</th>
                        <th>Curso</th>
                        <th>Instructor</th>
                        <th>Duración (hrs)</th>
                    </tr>
                    </thead>
                    <tbody>
                    {% for curso in cursos %}
                    <tr>
                        <td>{{ curso.id_curso }}</td>
                        <td>{{ curso.nombre }}</td>
                        <td>{{ curso.instructor }}</td>
                        <td>{{ curso.duracion }}</td>
                    </tr>
                    {% endfor %}
                    </tbody>
                </table>
                {% else %}
                <p class="text-muted mb-0">No hay cursos registrados aún.</p>
                {% endif %}
            </div>
        </div>
    </main>
</div>

<script
        crossorigin="anonymous"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
